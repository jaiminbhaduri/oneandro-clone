name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # Type-check + unit/e2e-test each service. These never touch a real
  # Postgres/Redis/Kafka: services use in-memory Prisma fakes (see
  # apps/*/test/support/in-memory-prisma.ts) or mocked clients for their
  # own tests, so this job only needs syntactically-valid env vars, not
  # live infrastructure — see docker-compose-smoke below for the job that
  # actually exercises the real stack.
  verify:
    name: verify (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: user-service, has_prisma: true }
          - { name: lead-service, has_prisma: true }
          - { name: ai-orchestrator, has_prisma: true }
          - { name: api-gateway, has_prisma: false }
          - { name: banking-adapter-mock, has_prisma: false }
    env:
      # Dummy values only — this job never connects to a real database,
      # Redis, or external API. Each service's ConfigModule throws at
      # bootstrap if these are missing at all (see apps/*/src/config/
      # configuration.ts's `required()` helper), so they just need to be
      # present and syntactically plausible.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_ACCESS_SECRET: ci-only-secret-at-least-32-characters-long
      REDIS_PASSWORD: ci-only-redis-password
      OPENAI_API_KEY: sk-ci-placeholder
      COHERE_API_KEY: ci-placeholder
      USER_SERVICE_URL: http://localhost:3001
      LEAD_SERVICE_URL: http://localhost:3002
      AI_ORCHESTRATOR_URL: http://localhost:3003
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # --ignore-scripts here mirrors apps/*/Dockerfile's `deps` stage:
      # this job only needs compiled type information, not a functional
      # argon2 native binding or Prisma's own postinstall — Prisma Client
      # generation is a separate, explicit step below.
      - name: Install workspace dependencies
        run: npm ci --ignore-scripts

      - name: Build @oneandro/common
        run: npm run build:common

      # `prisma`/@prisma/client resolve NESTED under
      # apps/<service>/node_modules in this project's actual lockfile,
      # not hoisted to the workspace root (verified directly against
      # package-lock.json). npx's binary lookup is cwd-based, unlike
      # TypeScript's file-relative module resolution (which is why the
      # Type-check step below needs no such fix) — so these two steps
      # must run from inside the app directory, not the repo root.
      - name: Validate Prisma schema
        if: matrix.service.has_prisma
        working-directory: apps/${{ matrix.service.name }}
        run: npx prisma validate

      - name: Generate Prisma Client
        if: matrix.service.has_prisma
        working-directory: apps/${{ matrix.service.name }}
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit -p apps/${{ matrix.service.name }}/tsconfig.json

      - name: Test
        run: npm run test -w @oneandro/${{ matrix.service.name }}

  # Builds every service's real Dockerfile. The five app services share a
  # root build context (see docs/REPO_MATRIX.md's "npm workspaces and what
  # it changed in Docker" — they need the sibling packages/common
  # workspace); nginx is self-contained (infra/nginx/Dockerfile, see its
  # own comment header) and gets its own context/dockerfile pair instead
  # of forcing it through the apps/<service>/Dockerfile convention the
  # other five share. This project has no Docker daemon available in
  # local dev, so this job is the *first* place these Dockerfiles are
  # ever actually built.
  docker-build:
    name: docker-build (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: api-gateway, context: ., dockerfile: apps/api-gateway/Dockerfile }
          - { name: user-service, context: ., dockerfile: apps/user-service/Dockerfile }
          - { name: lead-service, context: ., dockerfile: apps/lead-service/Dockerfile }
          - { name: ai-orchestrator, context: ., dockerfile: apps/ai-orchestrator/Dockerfile }
          - { name: banking-adapter-mock, context: ., dockerfile: apps/banking-adapter-mock/Dockerfile }
          - { name: nginx, context: ./infra/nginx, dockerfile: infra/nginx/Dockerfile }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: oneandro/${{ matrix.service.name }}:ci
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # Boots the actual production images via docker-compose (explicitly NOT
  # docker-compose.override.yml's dev hot-reload variant — see the -f flag
  # below) and drives one real request flow through the edge. This is the
  # only place in this project's history that the full system — Nginx LB,
  # both replicas of three services, Kafka KRaft boot, the migration jobs'
  # completion-gated startup ordering — has actually run together.
  compose-smoke-test:
    name: docker-compose smoke test
    runs-on: ubuntu-latest
    needs: [docker-build]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          set -euo pipefail
          cp .env.example .env
          # Dummy but well-formed secrets — this smoke test never calls
          # OpenAI/Cohere/LangSmith for real, only checks that every
          # service boots and answers a real register -> login -> create-lead
          # flow through Nginx.
          sed -i "s#^JWT_ACCESS_SECRET=.*#JWT_ACCESS_SECRET=ci-smoke-test-secret-at-least-32-characters#" .env
          sed -i "s#^POSTGRES_PASSWORD=.*#POSTGRES_PASSWORD=ci-smoke-postgres#" .env
          sed -i "s#^REDIS_PASSWORD=.*#REDIS_PASSWORD=ci-smoke-redis#" .env
          sed -i "s#^PGADMIN_DEFAULT_PASSWORD=.*#PGADMIN_DEFAULT_PASSWORD=ci-smoke-pgadmin#" .env
          sed -i "s#^LANGCHAIN_TRACING_V2=.*#LANGCHAIN_TRACING_V2=false#" .env

      - name: Build and start the stack (production images only — dev tools excluded)
        run: |
          docker compose -f docker-compose.yml up -d --build --wait --wait-timeout 600 \
            nginx api-gateway-1 api-gateway-2 \
            user-service-1 user-service-2 \
            lead-service-1 lead-service-2 \
            ai-orchestrator banking-adapter-mock \
            postgres redis kafka kafka-topic-init mailhog

      - name: Show service status
        if: always()
        run: docker compose -f docker-compose.yml ps

      - name: Smoke test — register, authenticate, create a lead
        run: |
          set -euo pipefail
          BASE=http://localhost/api/v1

          echo "== register =="
          curl -sf -c cookies.txt -X POST "$BASE/auth/register" \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci-smoke@example.com","password":"Str0ng!Passw0rd","firstName":"CI","lastName":"Smoke"}' \
            -o register.json
          cat register.json

          echo "== authenticated profile read =="
          curl -sf -b cookies.txt "$BASE/users/me" -o me.json
          cat me.json

          echo "== create a lead =="
          curl -sf -b cookies.txt -X POST "$BASE/leads" \
            -H 'Content-Type: application/json' \
            -d '{"loanAmountRequested":15000,"loanPurpose":"DEBT_CONSOLIDATION"}' \
            -o lead.json
          cat lead.json

          echo "== gateway aggregation endpoint =="
          curl -sf -b cookies.txt "$BASE/dashboard/me" -o dashboard.json
          cat dashboard.json

          echo "smoke test passed"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=300

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
