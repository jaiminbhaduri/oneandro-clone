user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Identity / OWASP hygiene ─────────────────────────────────────────
    server_tokens off;                 # don't leak Nginx version
    # Full "Server" header removal needs the headers-more module (not in
    # stock nginx:alpine). `server_tokens off` is enough to drop the version
    # string; swap the base image for `openresty/openresty` if the bare
    # header name itself must go too.

    # ── Logging (JSON, with request id for cross-service tracing) ───────
    log_format edge_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';
    access_log /var/log/nginx/access.log edge_json;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    reset_timedout_connection on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types application/json application/javascript text/css text/plain application/xml;
    gzip_vary on;

    # ── Body size: KYC document uploads (ID scans, pay stubs, bank statements) ──
    client_max_body_size 25m;
    client_body_buffer_size 1m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    large_client_header_buffers 4 16k;

    # ── DDoS / abuse mitigation (coarse, connection/IP-level) ────────────
    # Fine-grained, per-user sliding-window limiting (Redis-backed) happens
    # one hop downstream in the api-gateway service — see packages/common/
    # src/rate-limit/sliding-window.strategy.ts. Nginx's job here is cheap,
    # stateless flood protection before a request ever reaches Node.
    limit_req_zone  $binary_remote_addr zone=edge_general:10m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=edge_auth:10m     rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=edge_conn:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # ── Upstreams: API Gateway replicas (round-robin + passive health checks) ──
    upstream api_gateway {
        least_conn;
        server api-gateway-1:3000 max_fails=3 fail_timeout=10s;
        server api-gateway-2:3000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
