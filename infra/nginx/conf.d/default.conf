server {
    listen 80;
    server_name _;

    # Enable and redirect once a real cert is mounted (see docker-compose
    # `nginx` service — 443 is already published, waiting on certs):
    # return 301 https://$host$request_uri;

    include /etc/nginx/snippets/security-headers.conf;

    limit_conn edge_conn 40;

    # ── Health check (LB target, no rate limit, no logging noise) ────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Auth endpoints: tight rate limit, brute-force mitigation ─────────
    location ~ ^/api/v1/auth/(login|refresh) {
        limit_req zone=edge_auth burst=3 nodelay;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://api_gateway;
    }

    # ── KYC document upload: larger body allowance, still rate limited ───
    location ~ ^/api/v1/leads/[^/]+/kyc {
        limit_req zone=edge_general burst=10 nodelay;
        client_max_body_size 25m;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://api_gateway;
    }

    # ── Everything else through the API Gateway ───────────────────────────
    location /api/ {
        limit_req zone=edge_general burst=40 nodelay;
        client_max_body_size 2m;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://api_gateway;
    }

    # ── Block anything not under /api/ or /healthz (no static content served here) ──
    location / {
        return 404;
    }

    # Never serve dotfiles (.env, .git, etc.) if a misconfigured root ever exposes them.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

