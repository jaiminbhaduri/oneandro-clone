# Helmet-equivalent header hardening injected at the edge, so every
# response gets these even if an upstream service forgets to (defense in
# depth — the services should still set their own, this is the backstop).

add_header X-Content-Type-Options        "nosniff"                         always;
add_header X-Frame-Options               "DENY"                            always;
add_header Referrer-Policy               "strict-origin-when-cross-origin" always;
add_header Permissions-Policy            "geolocation=(), microphone=(), camera=(), payment=()" always;
add_header X-XSS-Protection              "1; mode=block"                   always;
add_header Cross-Origin-Opener-Policy    "same-origin"                     always;
add_header Cross-Origin-Resource-Policy  "same-origin"                     always;

# HSTS — only meaningful (and only sent) once TLS is terminated here.
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Baseline CSP for a pure JSON API edge. Tighten further once the
# frontend origin(s) that consume this API are finalized.
add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
