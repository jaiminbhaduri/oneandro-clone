# Local-dev Redis config. Backs three distinct concerns on one instance:
#   1) API Gateway sliding-window rate limiting (packages/common/rate-limit)
#   2) LangChain Tier-1 semantic cache (24h TTL vector query cache)
#   3) General ephemeral caching
#
# In production these would likely be split into separate Redis
# databases/instances so rate-limit traffic can't be starved by cache churn.

# requirepass is NOT set here — redis.conf has no env-var interpolation.
# It's passed at container start via `command:` in docker-compose.yml so it
# can be sourced from .env instead of hardcoded into this file.

appendonly yes
appendfsync everysec

maxmemory 256mb
maxmemory-policy allkeys-lru

# Rename/disable dangerous commands at the edge of the network too (defense
# in depth alongside network segmentation in docker-compose.yml).
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
